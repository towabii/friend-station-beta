<!DOCTYPE html>

<html lang="en">
<head>


































































































































































    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Application</title>
    <!-- Add your CSS and other resources here -->
</head>
<body>

































































































































































































































































































































































































































































































    <div id="video-grid"></div>
































    <button id="btn-mic">Mic: ON</button>
    <button id="btn-cam">Cam: ON</button>
    <button id="btn-spk">Spk: ON</button>

    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.0.4/dist/html5-qrcode.min.js"></script>
    <script src="firebase-app.js"></script>
    <script src="firebase-auth.js"></script>
    <script src="firebase-firestore.js"></script>
    <script>
        // Initialize Firebase
        var firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
    firebase.initializeApp(firebaseConfig);






































































































































































































































































































































































































































































































































































































































































































































































































        var auth = firebase.auth();
        var db = firebase.firestore();

        var myInfo = null;
        var token = localStorage.getItem('token');
        if (token) {
            auth.signInWithCustomToken(token).then((userCredential) => {
                // Signed in
                var user = userCredential.user;
                console.log("User signed in");
            }).catch((error) => {
                // Handle Errors here.
                var errorCode = error.code;
                var errorMessage = error.message;
                console.error(errorMessage);
            });
        }

        auth.onAuthStateChanged(async (user) => {
            if (user && !token) {
            token = user.uid;



                const u = await db.collection('users').doc(token).get();
                if (u.exists && u.data().status === 'approved') {
                    myInfo = u.data();
                    localStorage.setItem('token', token);
                    localStorage.setItem('myInfo', JSON.stringify(myInfo));
                initApp();


                } else {
                    auth.signOut();
                }
            } else if (!user && token) {
                logout();
            }
    });


        function initApp() {
            // Initialize your application logic here
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('myInfo');
            window.location.href = 'login.html';
        }

        function updateProfile(key, val) {
            if (key === 'username') {
                if (!/^[a-zA-Z0-9_\-\.\=]+$/.test(val)) {
                    showConfirm("ユーザーIDは半角英数字と一部記号のみ使用可能です。");
                    return;
                }
                const users = await db.collection('users').get();
                const existingUser = users.docs.find(doc => doc.data().username.toLowerCase() === val.toLowerCase());
                if (existingUser && existingUser.id !== myInfo.id) {
                    showToast("既に使用されています");
                    return;
                }
            }
            db.collection('users').doc(myInfo.id).update({ [key]: val }).then(() => {
                myInfo[key] = val;
                localStorage.setItem('myInfo', JSON.stringify(myInfo));
                const sc = id('sc-' + (key === 'username' ? 'id' : key === 'nickname' ? 'nick' : 'status'));
                if (sc) {
                    sc.classList.add('show');
                    setTimeout(() => sc.classList.remove('show'), 2000);
                }
                if (key === 'username') {
                    id('my-id-disp').innerText = val;
                    QRCode.toCanvas(id('my-qr'), val, { width: 200, margin: 2 });
                }
            }).catch((error) => {
                console.error(error);
            });
        }

        function showConfirm(message) {
            return new Promise((resolve, reject) => {
                const confirm = window.confirm(message);
                if (confirm) {
                    resolve(true);
                } else {
                    resolve(false);
                }
            });
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function id(selector) {
            return document.getElementById(selector);
        }
</script>

    <style>
        /* Add your CSS styles here */
    </style>
</body>
</html>
